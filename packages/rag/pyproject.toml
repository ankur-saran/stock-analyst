[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rag"
version = "0.1.0"
description = "RAG pipeline — document ingestion, chunking, embedding, and hybrid retrieval"
requires-python = ">=3.12"
dependencies = [
    "pymupdf",
    "qdrant-client",
    "llama-index-core",
    "rank-bm25",
    "sentence-transformers",
    "celery[redis]",
    "httpx",
]

[tool.hatch.build.targets.wheel]
packages = ["src/rag"]
