[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rag"
version = "0.1.0"
description = "RAG pipeline — document ingestion, chunking, embedding, and hybrid retrieval"
requires-python = ">=3.12"
dependencies = [
    "pymupdf",
    "qdrant-client",
    "llama-index-core",
    "rank-bm25",
    "sentence-transformers",
    "celery[redis]",
    "httpx",
    "structlog",
]

[project.optional-dependencies]
unstructured = [
    "unstructured[pdf]",
]
docling = [
    "docling",
]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "reportlab",
]

[tool.hatch.build.targets.wheel]
packages = ["src/rag"]
